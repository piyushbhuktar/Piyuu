<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Natyarang Jalgaon | Admin Login</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <!-- Floating particle elements in background -->
    <div class="background-decorations">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
    </div>

    <!-- Login Container -->
    <div class="login-wrapper">
        <div class="login-card">
            <div class="brand">
                <i class="fa-solid fa-masks-theater logo-icon"></i>
                <h2>NATYARANG</h2>
                <p>JALGAON • ADMIN PORTAL</p>
            </div>
            
            <form id="loginForm">
                <div class="input-group">
                    <label for="username"><i class="fa-regular fa-user"></i> Username</label>
                    <input type="text" id="username" placeholder="Enter admin username" required autocomplete="username">
                </div>

                <div class="input-group">
                    <label for="password"><i class="fa-solid fa-lock"></i> Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Enter security password" required autocomplete="current-password">
                        <button type="button" id="togglePassword" class="toggle-password">
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <span>Access Dashboard</span>
                    <i class="fa-solid fa-arrow-right-to-bracket"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- Toast Notification Container -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Script file -->
    <script src="js/login.js"></script>
</body>
</html>
